<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="outer">
         
        <div class="input"><input type="text" placeholder="enter expression"></div>
            <hr>
            <div class="btns-box">
                <div class="btn d">/</div>
                <div class="btn mul">*</div>
                <div class="btn mi">-</div>
                <div class="btn clr">Clr</div>
                <div class="btn one">1</div>
                <div class="btn two">2</div>
                <div class="btn three">3</div>
                <div class="btn add">+</div>
                <div class="btn four">4</div>
                <div class="btn five">5</div>
                <div class="btn six">6</div>
                <div class="btn seven">7</div>
                <div class="btn eight">8</div>
                <div class="btn nine">9</div>
                <div class="btn zero">0</div>
                <div class="btn equals">=</div>
            </div>

        
    </div>


</body>
</html>
